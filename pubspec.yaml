name: shopping_app
description: "Shopping App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.2
  lottie: ^3.1.0
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  shared_preferences: ^2.5.5
  flutter_localization: ^0.4.0
  cached_network_image: ^3.4.1
  dotted_border: ^3.0.0
  country_picker: ^2.0.27

  # Problematic constraints opened up to safe version windows:
  haptic_feedback: ">=0.6.0 <1.0.0"
  chips_choice: ">=3.0.0 <4.0.0"
  package_info_plus: ">=9.0.0 <11.0.0"

  pinput: ^6.0.2
  image_picker: ^1.2.1
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  dropdown_button2: ^3.0.0
  animated_custom_dropdown: ^3.1.1
  video_player: ^2.8.1
  flutter_cache_manager: ^3.4.1
  visibility_detector: ^0.4.0+2
  font_awesome_flutter: ^11.0.0
  google_maps_flutter: ^2.5.3
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_secure_storage: ^10.0.0
  dio: ^5.9.2
  crypto: ^3.0.7
  bloc: ^9.2.1
  connectivity_plus: ^7.1.1
  meta: ^1.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/fonts/
    - assets/icon/
    - assets/image/
    - assets/icon/i_color/
    - assets/icon/i_buy_item/
    - assets/video/
  fonts:
    - family: english
      fonts:
        - asset: assets/fonts/SF-Pro-Rounded-Regular.otf
          weight: 400
        - asset: assets/fonts/SF-Pro-Rounded-Bold.otf
          weight: 700

    - family: khmer
      fonts:
        - asset: assets/fonts/KohSantepheap-Regular.ttf
          weight: 400
        - asset: assets/fonts/KohSantepheap-Bold.ttf
          weight: 700